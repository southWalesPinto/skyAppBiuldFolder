{% extends "accounts/base_auth.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="card">
  <div class="logo"></div>
  <h1>Set New Password</h1>
  <form method="post">
    {% csrf_token %}
    <div class="field"><label>New Password</label>{{ form.new_password1 }}</div>
    <div class="field"><label>Confirm Password</label>{{ form.new_password2 }}</div>
    <button class="btn" type="submit">Set Password</button>
  </form>
</div>
{% endblock %}
