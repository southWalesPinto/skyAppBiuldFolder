<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sky App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #d9dce1; color: #1f2937; }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: flex; justify-content: space-between; }
    header .brand { font-weight: 700; font-size: 14px; }
    header a { color: #111827; text-decoration: none; font-size: 12px; margin-left: 14px; }
    main { min-height: calc(100vh - 96px); display: grid; place-items: center; padding: 20px; }
    .card { width: 100%; max-width: 400px; background: #fff; border: 1px solid #e5e7eb; padding: 28px; }
    .logo { width: 34px; height: 34px; background: #6b7280; margin: 0 auto 10px; }
    h1 { margin: 0 0 6px; font-size: 22px; text-align: center; }
    .sub { margin: 0 0 18px; font-size: 12px; color: #6b7280; text-align: center; }
    label { font-size: 12px; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 9px; border: 1px solid #d1d5db; font-size: 13px; }
    .field { margin-bottom: 11px; }
    .btn { width: 100%; border: 0; background: #1f2937; color: #fff; padding: 10px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; text-align:center; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 12px; }
    .row a, .link { color: #111827; text-decoration: none; font-size: 12px; }
    .center { text-align: center; }
    .muted { color: #6b7280; font-size: 12px; }
    .errors { color: #b91c1c; font-size: 12px; margin: 0 0 10px; padding-left: 16px; }
    footer { border-top: 1px solid #e5e7eb; background: #fff; padding: 10px; text-align: right; font-size: 11px; color: #6b7280; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Sky</div>
    <div>
      <a href="#">Help</a>
      <a href="#">Contact support</a>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>Privacy Policy &nbsp; Terms of service &nbsp; Contact</footer>
</body>
</html>
