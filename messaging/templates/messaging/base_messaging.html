<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Messages{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-sidebar {
            width: 180px;
            background: #1f2d3d;
            color: white;
            padding: 20px;
        }

        .logo {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .main-sidebar a {
            display: block;
            color: #dce3ea;
            text-decoration: none;
            margin: 18px 0;
        }

        .page {
            flex: 1;
            background: #f4f6f8;
        }

        .topbar {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            font-size: 22px;
            font-weight: bold;
        }

        .content-layout {
            display: flex;
            padding: 25px;
            gap: 25px;
        }

        .message-nav {
            width: 220px;
            background: white;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .message-nav a {
            display: block;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #222;
            font-weight: bold;
            background: white;
        }

        .message-nav a:hover,
        .message-nav .active {
            background: #e9edf2;
        }

        .new-message {
            background: #1f2d3d !important;
            color: white !important;
            text-align: center;
        }

        .message-content {
            flex: 1;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="layout">

    <aside class="main-sidebar">
        <div class="logo">Sky App</div>

        <a href="#">Dashboard</a>
        <a href="#">Teams</a>
        <a href="#">Organisation</a>
        <a href="{% url 'messaging:inbox' %}">Messages</a>
        <a href="#">Schedule</a>
    </aside>

    <main class="page">
        <div class="topbar">
            {% block page_heading %}Messages{% endblock %}
        </div>

        <div class="content-layout">

            <nav class="message-nav">
                <a class="new-message" href="#">
                    New Message
                </a>

                <a href="{% url 'messaging:inbox' %}">
                    Inbox
                </a>

                <a href="{% url 'messaging:sent' %}">
                    Sent
                </a>

                <a href="{% url 'messaging:drafts' %}">
                    Drafts
                </a>
            </nav>

            <section class="message-content">
                {% block content %}{% endblock %}
            </section>

        </div>
    </main>

</div>

</body>
</html>
