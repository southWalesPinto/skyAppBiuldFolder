<!DOCTYPE html>
<html>
<head>
    <title>Sent</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .message {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid #2ecc71;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        a {
            color: #2ecc71;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>Sent Messages</h1>

{% if messages %}
    {% for message in messages %}
        <div class="message">
            <h3>{{ message.subject }}</h3>
            <p><strong>To:</strong> {{ message.recipient }}</p>
            <p><strong>Date:</strong> {{ message.sent_at }}</p>

            <a href="{% url 'messaging:view_message' message.id %}">View Message</a>
        </div>
    {% endfor %}
{% else %}
    <p>No sent messages.</p>
{% endif %}

</body>
</html>
