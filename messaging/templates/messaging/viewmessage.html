<!DOCTYPE html>
<html>
<head>
    <title>View Message</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            max-width: 600px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        .meta {
            color: gray;
            font-size: 14px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>{{ message.subject }}</h1>

    <p class="meta">
        From: {{ message.sender }} <br>
        To: {{ message.recipient }} <br>
        Date: {{ message.sent_at }}
    </p>

    <hr>

    <p>{{ message.body }}</p>

    <a href="{% url 'messaging:inbox' %}">← Back to Inbox</a>

</div>

</body>
</html>
