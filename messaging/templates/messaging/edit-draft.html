<!DOCTYPE html>
<html>
<head>
    <title>Edit Draft</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            max-width: 500px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }

        .save {
            background: #f39c12;
            color: white;
        }

        .send {
            background: #2ecc71;
            color: white;
        }
    </style>
</head>

<body>

<h1>Edit Draft</h1>

<form method="POST">
    {% csrf_token %}

    <label>Recipient</label>
    <input type="text" name="recipient" value="{{ message.recipient }}">

    <label>Subject</label>
    <input type="text" name="subject" value="{{ message.subject }}">

    <label>Message</label>
    <textarea name="body">{{ message.body }}</textarea>

    <button class="save" type="submit" name="save">Save Draft</button>
    <button class="send" type="submit" name="send" value="true">Send</button>
</form>

<br>
<a href="{% url 'messaging:drafts' %}">Back to Drafts</a>

</body>
</html>
