<!DOCTYPE html>
<html>
<head>
    <title>Upcoming Meetings</title>
</head>
<body>
    <h1>Upcoming Meetings</h1>

    <p><a href="/meetings/">All Meetings</a></p>

    {% if meetings %}
        <ul>
            {% for meeting in meetings %}
                <li>
                    <strong>{{ meeting.title }}</strong> - {{ meeting.date }} - {{ meeting.time }} - {{ meeting.platform }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No upcoming meetings.</p>
    {% endif %}
</body>
</html>
