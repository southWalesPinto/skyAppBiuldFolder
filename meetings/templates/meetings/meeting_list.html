<!DOCTYPE html>
<html>
<head>
    <title>Meetings</title>
</head>
<body>
    <h1>Meetings</h1>

    <a href="/meetings/create/">Create Meeting</a>
<ul>
    {% for meeting in meetings %}
        <li>
            {{ meeting.title }} - {{ meeting.date }}
            <a href="{% url 'meetings:delete_meeting' meeting.id %}">Delete</a>
        </li>
    {% endfor %}
</ul>    
</body>
</html>
