{% extends "base.html" %}

{% block title %}
Create Meeting
{% endblock %}

{% block Username %}
{{ request.user.username|default:"User" }}
{% endblock %}

{% block content %}
<h2>Create Meeting</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Meeting</button>
</form>

<p><a href="{% url 'meetings:meeting_list' %}">Back to Meetings</a></p>
{% endblock %}
